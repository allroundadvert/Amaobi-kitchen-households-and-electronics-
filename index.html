<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doorz Empire</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HERO */
.hero{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  max-height:320px;
  background:#0a0a0a;
  border-bottom:4px solid var(--gold);
}
.hero img{
  max-width:100%;
  max-height:320px;
  object-fit:contain;
}

/* INFO */
.info{
  text-align:center;
  padding:15px;
}
.info h2{color:var(--gold); margin-bottom:5px;}
.info p{margin-top:0;}

/* FORM */
.form-box{
  max-width:750px;
  margin:40px auto;
  padding:30px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{
  color:var(--gold);
  text-align:center;
}
label{
  display:block;
  margin-top:15px;
  font-weight:600;
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}
textarea{
  min-height:100px;
}
button{
  margin-top:25px;
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

/* FLOATING BUTTONS */
.whatsapp,.facebook,.call{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:150px;background:#ff9800}
.facebook{bottom:210px;background:#1877f2}

footer{
  background:#000;
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- ONLY TOP IMAGE -->
<div class="hero">
<img src="https://raw.githubusercontent.com/allroundadvert/DOORZ-EMPIRE-/2cbc3b259bf0b03765dca4993273c8526272f765/1774524719196.png">
</div>

<div class="info">
<h2>DOORZ EMPIRE</h2>
<p>Giant Ina all kinds of Doors of different categories you can think of. Tested and Trusted.</p>
</div>

<!-- FORM -->
<div class="form-box">
<h2>Booking & Order Form</h2>
<form onsubmit="send();return false;">

<label>Customer Name</label>
<input id="customerName" placeholder="Full Name">

<label>Phone Number</label>
<input id="customerPhone" placeholder="Phone Number">

<label>Specifications</label>
<textarea id="specifications"></textarea>

<button>Submit via WhatsApp</button>
</form>
</div>

<footer>© 2026 Doorz Empire</footer>

<!-- BUTTONS -->
<a class="whatsapp" href="https://wa.me/2347039320784">WhatsApp</a>
<a class="call" href="tel:09043376408">Call</a>
<a class="facebook" href="https://www.facebook.com/share/1T26ikf4s8/">Facebook</a>

<script>
function send(){
  const name = document.getElementById("customerName").value;
  const phone = document.getElementById("customerPhone").value;
  const specs = document.getElementById("specifications").value;

  const msg = `Name: ${name}
Phone: ${phone}
Specs: ${specs}`;

  window.open("https://wa.me/2347039320784?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
